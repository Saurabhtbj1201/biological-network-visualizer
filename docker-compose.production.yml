version: '3.8'

services:
  # PostgreSQL Database (Production Configuration)
  postgres:
    image: postgres:15-alpine
    container_name: networkinsight-db
    environment:
      POSTGRES_DB: ${DB_NAME:-networkinsight}
      POSTGRES_USER: ${DB_USER:-networkinsight}
      POSTGRES_PASSWORD: ${DB_PASSWORD}  # ⚠️ SET in .env.production
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - networkinsight

  # Redis Cache (Production Configuration)
  redis:
    image: redis:7-alpine
    container_name: networkinsight-cache
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - networkinsight

  # Backend (Flask + Gunicorn)
  backend:
    build:
      context: ./prototype-backend
      dockerfile: Dockerfile
    container_name: networkinsight-backend
    environment:
      FLASK_ENV: production
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}  # ⚠️ Generate: openssl rand -hex 32
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      WORKERS: ${WORKERS:-4}
      THREAD_POOL: ${THREAD_POOL:-32}
      CORS_ORIGINS: ${CORS_ORIGINS}  # ⚠️ Set to your domain(s)
      LOG_LEVEL: INFO
      MAX_CONTENT_LENGTH: "104857600"  # 100MB
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - networkinsight
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Frontend (Node.js + Nginx)
  frontend:
    build:
      context: ./prototype-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}  # ⚠️ Point to production API
    container_name: networkinsight-frontend
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - networkinsight
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: networkinsight-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # ⚠️ Add your SSL certificates here
    depends_on:
      - backend
      - frontend
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - networkinsight

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  networkinsight:
    driver: bridge
